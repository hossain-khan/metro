# For local development/live edit:
# python3 -m venv .venv (required only once)
# source .venv/bin/activate
# pip install -r .github/workflows/mkdocs-requirements.txt
# ./scripts/copy_docs_files.sh
# zensical serve
#
# ℹ️ NOTE: Deployment is done via `mike` for versioned site using GitHub Actions
#          For manual deployment, use `./scripts/deploy_metro_docs_site.sh`
# ℹ️ NOTE: See docs/zensical-migration.md for details on the partial Zensical migration

site_name: Metro
repo_name: Metro
repo_url: https://github.com/ZacSweers/metro
edit_uri: edit/main/docs/
# site_url is set via env var so local `zensical serve` works at root without prefix issues
site_url: !ENV [SITE_URL, '']
site_description: "A multiplatform dependency injection framework for Kotlin"
site_author: Zac Sweers
remote_branch: gh-pages

copyright: 'Copyright &copy; 2025 Zac Sweers'

theme:
  name: 'material'
  favicon: site-assets/img/favicon.ico
  logo: site-assets/img/metro-icon.svg
  palette:
    - media: '(prefers-color-scheme)'
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: 'white'
      accent: 'green'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: 'black'
      accent: 'green'
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: 'Inter'
    code: 'Fira Code'
  features:
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - navigation.tabs
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.suggest
  # Custom dir for theme overrides (eg. custom 404 page)
  # - https://squidfunk.github.io/mkdocs-material/customization/
  custom_dir: 'docs/site-assets/overrides'

plugins:
  # Social plugin for delightful card previews on social media
  # https://squidfunk.github.io/mkdocs-material/plugins/social/
  - social
  - search
  # Versioned Metro docs site for each release
  # https://github.com/jimporter/mike
  - mike
  # https://github.com/sondregronas/mkdocs-callouts
  - callouts
  # Last update date in the footer of each page
  # https://github.com/timvink/mkdocs-git-revision-date-localized-plugin
  - git-revision-date-localized:
      enabled: !ENV [CI, false]

#extra_css:
#  - 'css/app.css'

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ZacSweers/metro
    - icon: material/heart
      link: https://github.com/sponsors/zacsweers
      name: Sponsor on GitHub

markdown_extensions:
  - smarty
  - codehilite:
      guess_lang: false
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - tables
  - admonition
  - attr_list
  - md_in_html
  - nl2br

nav:
  - 'Home': index.md
  - 'Getting Started':
      - 'Quick Start': quickstart.md
      - 'Installation': installation.md
      - 'Features': features.md
      - 'Differences': differences.md
  - 'Docs':
      - 'Dependency Graphs': dependency-graphs.md
      - 'Provides': provides.md
      - 'Injection Types': injection-types.md
      - 'Scopes': scopes.md
      - 'Metro Intrinsics': metro-intrinsics.md
      - 'Bindings': bindings.md
      - 'Aggregation (aka "Anvil")': aggregation.md
      - 'Multiplatform': multiplatform.md
      - 'Validation & Error Reporting': validation-and-error-reporting.md
      - 'Interop': interop.md
      - 'Generating Custom Metro Code': generating-metro-code.md
  - 'MetroX':
      - 'Android': metrox-android.md
      - 'ViewModel': metrox-viewmodel.md
      - 'ViewModel Compose': metrox-viewmodel-compose.md
  - 'Guides & Samples':
      - 'Performance': performance.md
      - 'Debugging': debugging.md
      - 'Graph Analysis': graph-analysis.md
      - 'Adoption Strategies': adoption.md
      - 'Samples': samples.md
  - 'Reference':
      - 'Compatibility': compatibility.md
      - 'Stability': stability.md
      - 'FAQ': faq.md
      - 'Design Doc': designdoc.html
  - 'Contributing':
      - 'Contributing': contributing.md
      - 'CoC': code-of-conduct.md
      - 'Discussions ↗': https://github.com/ZacSweers/metro/discussions
  - 'Change Log': changelog.md
  - 'Sponsoring': sponsoring.md
  - 'API ↗': api/index.html
